data:
  start: "2024-01-01"
  end: "2025-12-31"
  grid:
    lats:
      start: 36.0
      stop: 44.0
      step: 0.25
    lons:
      start: -10.0
      stop: 4.0
      step: 0.25
# Parámetros que no cambian entre fases
aurora_base:
  batch_size: 2
  weight_decay: 1e-4
  num_workers: 4
  train_split: 0.7
  input_hours: 24
  scheduler_eta_min: 1e-6
  checkpoint: null 

# Planificación del fin de semana
fases:
  fase1: # Aprendizaje inicial y adaptación al terreno
    epochs: 100
    learning_rates: [2.0e-4, 1.0e-4, 5.0e-5]
    target_hours: 1
    forecast_hours: 1
  
  fase2: # Estabilización y autorregresión corta
    epochs: 100
    learning_rates: [5.0e-5, 1.0e-5, 5.0e-6] 
    target_hours: 1 
    forecast_hours: 6
  
  fase3: # Refinado final para horizontes largos
    epochs: 50
    learning_rates: [1.0e-5, 5.0e-6, 1.0e-6]
    target_hours: 1
    forecast_hours: 24